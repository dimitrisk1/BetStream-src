replicaCount: 2

image:
  repository: ghcr.io/example/betstream
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  aspnetcoreEnvironment: Production
  kafkaBootstrapServers: kafka:9092
  kafkaTopic: betstream.messages
  kafkaConsumerGroupId: betstream-consumers
  jwtIssuer: BetStream
  jwtAudience: BetStreamUsers

secrets:
  connectionString: Host=postgres;Port=5432;Database=betstream;Username=postgres;Password=postgres
  jwtKey: replace-me-before-production

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: betstream.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - betstream.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
