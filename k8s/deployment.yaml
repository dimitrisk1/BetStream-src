apiVersion: apps/v1
kind: Deployment
metadata:
  name: betstream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: betstream
  template:
    metadata:
      labels:
        app: betstream
    spec:
      containers:
        - name: betstream
          image: ghcr.io/example/betstream:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: betstream-config
            - secretRef:
                name: betstream-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
